<!-- start custom comments snippet -->
<!-- giscus comments (https://giscus.app) — stored in GitHub Discussions of this repo -->
<script>
  (function () {
    /* Match giscus to the site's current dark/light theme */
    var getGiscusTheme = function () {
      return document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
    };

    var script = document.createElement("script");
    script.src = "https://giscus.app/client.js";
    script.async = true;
    script.crossOrigin = "anonymous";
    script.setAttribute("data-repo", "Chaojie-Zhang/Chaojie-Zhang.github.io");
    script.setAttribute("data-repo-id", "R_kgDOPDgXEQ");
    script.setAttribute("data-category", "Announcements");
    script.setAttribute("data-category-id", "DIC_kwDOPDgXEc4DBAtt");
    script.setAttribute("data-mapping", "pathname");
    script.setAttribute("data-strict", "0");
    script.setAttribute("data-reactions-enabled", "1");
    script.setAttribute("data-emit-metadata", "0");
    script.setAttribute("data-input-position", "bottom");
    script.setAttribute("data-theme", getGiscusTheme());
    script.setAttribute("data-lang", "en");
    script.setAttribute("data-loading", "lazy");
    document.getElementById("comments").appendChild(script);

    /* Keep giscus in sync when the user flips the site theme toggle */
    var syncGiscusTheme = function () {
      var iframe = document.querySelector("iframe.giscus-frame");
      if (!iframe) { return; }
      iframe.contentWindow.postMessage(
        { giscus: { setConfig: { theme: getGiscusTheme() } } },
        "https://giscus.app"
      );
    };
    new MutationObserver(syncGiscusTheme).observe(document.documentElement, {
      attributes: true,
      attributeFilter: ["data-theme"]
    });
  })();
</script>
<!-- end custom comments snippet -->
