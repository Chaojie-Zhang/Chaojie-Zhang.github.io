name: Match paper PDFs

# Manual button: after uploading PDFs to assets/pdf/papers/, go to the
# Actions tab -> "Match paper PDFs" -> "Run workflow". It renames each new
# PDF to <citekey>.pdf, adds the pdf field to the matching bib entry, and
# commits — which triggers the normal site deploy.
on: workflow_dispatch

permissions:
  contents: write

jobs:
  match:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Match PDFs to publications
        run: python3 bin/match_pdfs.py

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes." && exit 0
          git commit -m "Match uploaded paper PDFs to publications [auto]"
          git push
